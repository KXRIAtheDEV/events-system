<!-- Manual M-Pesa Checkout Modal (shared) -->
<div class="modal checkout-modal" id="checkoutModal" style="display:none;">
    <div class="checkout-modal-content">
        <span id="checkoutClose" class="checkout-close">&times;</span>
        <h3><i class="fas fa-mobile-alt"></i> Pay with M-Pesa</h3>

        <div id="checkoutStep1">
            <p class="checkout-hint">Send the exact amount below to the organizer using any of the payment options.</p>
            <div class="checkout-summary">
                <span id="checkoutTierBadge" class="checkout-tier-badge ticket-tier-regular">Regular</span>
                <div class="checkout-amount" id="checkoutTotalAmount">KES 0</div>
                <div class="checkout-receiver">Pay to: <strong id="checkoutReceiverName"></strong></div>
            </div>
            <div id="checkoutPaymentOptions" class="checkout-payment-options"></div>
            <button type="button" id="checkoutPaidBtn" class="checkout-primary-btn">I have paid</button>
        </div>

        <div id="checkoutStep2" style="display:none;">
            <p class="checkout-hint">Upload a screenshot of your M-Pesa confirmation message.</p>
            <input type="file" id="checkoutScreenshot" accept="image/jpeg,image/png,image/webp" class="checkout-file-input">
            <div id="checkoutScreenshotPreview" class="checkout-preview"></div>
            <button type="button" id="checkoutVerifyBtn" class="checkout-primary-btn">Verify payment</button>
        </div>

        <div id="checkoutStep3" style="display:none;">
            <div class="stream-loader">
                <div class="stream-loader-spinner"></div>
                <h3 class="stream-loader-title">Verifying your payment</h3>
                <div id="checkoutStreamSteps" class="stream-loader-steps"></div>
            </div>
        </div>

        <div id="checkoutStep4Success" style="display:none;" class="checkout-result success">
            <i class="fas fa-check-circle"></i>
            <h4>Ticket issued!</h4>
            <p id="checkoutSuccessMessage"></p>
            <p>Ticket: <strong id="checkoutTicketNumber"></strong></p>
            <span id="checkoutSuccessTier" class="checkout-tier-badge"></span>
            <button type="button" id="checkoutViewTicketsBtn" class="checkout-primary-btn">View my tickets</button>
        </div>

        <div id="checkoutStep4Fail" style="display:none;" class="checkout-result fail">
            <i class="fas fa-exclamation-circle"></i>
            <p id="checkoutFailMessage">EventHub could not read the screenshot properly, wanna try again?</p>
            <div class="checkout-fail-actions">
                <button type="button" id="checkoutRetryBtn" class="checkout-secondary-btn">Try again</button>
                <button type="button" id="checkoutManualBtn" class="checkout-secondary-btn">Submit M-Pesa name for organizer approval</button>
            </div>
            <div id="checkoutManualNameBox" style="display:none;" class="checkout-manual-box">
                <label>Your M-Pesa name (as shown on the transaction)</label>
                <input type="text" id="checkoutMpesaName" class="checkout-text-input" placeholder="e.g. JOHN DOE">
                <button type="button" id="checkoutSubmitNameBtn" class="checkout-primary-btn">Send for approval</button>
            </div>
        </div>
    </div>
</div>
