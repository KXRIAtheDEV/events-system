{% extends 'attendee/base.html' %}
{% load static %}

{% block title %}Search Events - EventHub{% endblock %}

{% block extra_css %}
<style>
    .search-page {
        background: linear-gradient(135deg, #f8fafc 0%, #ffffff 100%);
        min-height: 100vh;
        padding: 2rem 0 4rem;
    }
    .container {
        max-width: 1400px;
        margin: 0 auto;
        padding: 0 2rem;
    }
    .search-header {
        text-align: center;
        margin-bottom: 2rem;
    }
    .search-header h1 {
        font-family: 'Kaushan Script', cursive;
        font-size: 2.5rem;
        background: linear-gradient(135deg, #f59e0b, #ec6408);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
        margin-bottom: 0.5rem;
    }
    .filters-section {
        background: white;
        padding: 1.5rem;
        border-radius: 16px;
        margin-bottom: 2rem;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
    }
    .filters-wrapper {
        display: flex;
        gap: 1rem;
        flex-wrap: wrap;
        justify-content: center;
    }
    .filter-group {
        flex: 1;
        min-width: 150px;
    }
    .filter-select {
        width: 100%;
        padding: 0.7rem 1rem;
        border: 1px solid #e2e8f0;
        border-radius: 40px;
        font-size: 0.85rem;
        background: white;
        cursor: pointer;
    }
    .results-count {
        text-align: center;
        margin-bottom: 1.5rem;
        color: #64748b;
    }
    .events-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
        gap: 1.8rem;
    }
    .pagination {
        margin-top: 3rem;
        text-align: center;
    }
    @media (max-width: 768px) {
        .container { padding: 0 1rem; }
        .search-header h1 { font-size: 1.8rem; }
        .filters-wrapper { flex-direction: column; }
    }
</style>
{% endblock %}

{% block content %}
<div class="search-page">
    <div class="container">
        <div class="search-header">
            <h1>Search Events</h1>
            <p id="searchQueryInfo">Find your perfect event</p>
        </div>
        
        <div class="filters-section">
            <div class="filters-wrapper">
                <div class="filter-group">
                    <select id="categoryFilter" class="filter-select">
                        <option value="">All Categories</option>
                    </select>
                </div>
                <div class="filter-group">
                    <select id="cityFilter" class="filter-select">
                        <option value="">All Cities</option>
                        <option value="nairobi">Nairobi</option>
                        <option value="mombasa">Mombasa</option>
                        <option value="kisumu">Kisumu</option>
                        <option value="eldoret">Eldoret</option>
                        <option value="nakuru">Nakuru</option>
                    </select>
                </div>
                <div class="filter-group">
                    <select id="sortBy" class="filter-select">
                        <option value="date_asc">Date: Soonest First</option>
                        <option value="date_desc">Date: Latest First</option>
                        <option value="price_asc">Price: Low to High</option>
                        <option value="price_desc">Price: High to Low</option>
                    </select>
                </div>
            </div>
        </div>
        
        <div class="results-count" id="resultsCount"></div>
        
        <div class="events-grid" id="searchResultsGrid"></div>
        
        <div class="pagination" id="pagination"></div>
    </div>
</div>
{% endblock %}

{% block extra_js %}

<script src="{% static 'js/attendee/events/search.js' %}"></script>
{% endblock %}
