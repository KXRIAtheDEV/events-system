<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}EventHub{% endblock %}</title>
    
    {% load static %}
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Shared CSS Files -->
    <link rel="stylesheet" href="{% static 'css/shared/variables.css' %}">
    <link rel="stylesheet" href="{% static 'css/shared/reset.css' %}">
    <link rel="stylesheet" href="{% static 'css/shared/typography.css' %}">
    <link rel="stylesheet" href="{% static 'css/shared/utilities.css' %}">
    <link rel="stylesheet" href="{% static 'css/shared/layout.css' %}">
    <link rel="stylesheet" href="{% static 'css/shared/buttons.css' %}">
    <link rel="stylesheet" href="{% static 'css/shared/forms.css' %}">
    <link rel="stylesheet" href="{% static 'css/shared/responsive.css' %}">
    <link rel="stylesheet" href="{% static 'css/shared/animations.css' %}">
    <link rel="stylesheet" href="{% static 'css/shared/messages.css' %}">
    <link rel="stylesheet" href="{% static 'css/shared/icons.css' %}">
    <link rel="stylesheet" href="{% static 'css/shared/auth.css' %}">
    
    {% block extra_css %}{% endblock %}
</head>
<body>
    <!-- No Navbar - Auth pages are standalone -->
    
    <!-- Messages -->
    <div class="messages-container" id="messageContainer">
        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-{{ message.tags }} alert-dismissible fade show">
                    {{ message }}
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
            {% endfor %}
        {% endif %}
    </div>
    
    <!-- Main Content -->
    <main class="main-content">
        {% block content %}
        {% endblock %}
    </main>
    
    <!-- No Footer - Auth pages are standalone -->
    
    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    
    <script>
        setTimeout(function() {
            const messages = document.getElementById('messageContainer');
            if (messages && messages.children.length > 0) {
                messages.style.transition = 'opacity 0.5s ease';
                messages.style.opacity = '0';
                setTimeout(function() { messages.style.display = 'none'; }, 500);
            }
        }, 5000);
    </script>
    
    {% block extra_js %}{% endblock %}
</body>
</html>
