{% load static %}
<header class="attendee-navbar">
    <div class="navbar-container">
        <a href="/" class="logo">
            <div class="logo-text">
                <span>EventHub</span>
                <small>Attendee</small>
            </div>
        </a>

        <button class="mobile-toggle" id="mobileToggle">
            <i class="fas fa-bars"></i>
        </button>

        <div class="nav-links" id="navLinks">
            <div class="mobile-close">
                <button class="close-menu" id="closeMenu">
                    <i class="fas fa-times"></i>
                </button>
            </div>

            <!-- Account Dropdown - AT THE TOP (Mobile only) -->
            <div class="nav-item-dropdown mobile-account-dropdown" id="mobileAccountDropdown">
                <a href="#" class="nav-link dropdown-trigger" onclick="return false;">
                    <div class="mobile-account-info">
                        <i class="fas fa-user-circle"></i>
                        <span id="mobileAccountLabel">Account</span>
                    </div>
                    <i class="fas fa-chevron-down dropdown-arrow"></i>
                </a>
                <div class="dropdown-submenu" id="mobileAccountSubmenu">
                    <!-- Logged Out View (Mobile) -->
                    <div id="mobileGuestLinks">
                        <a href="/login/" class="submenu-item">
                            <i class="fas fa-sign-in-alt"></i>
                            <span>Login</span>
                        </a>
                    </div>
                    <!-- Logged In View (Mobile) -->
                    <div id="mobileUserLinks" style="display: none;">
                        <a href="/dashboard/" class="submenu-item">
                            <i class="fas fa-tachometer-alt"></i>
                            <span>Dashboard</span>
                        </a>
                        <a href="/profile/" class="submenu-item">
                            <i class="fas fa-user"></i>
                            <span>My Profile</span>
                        </a>
                        <a href="/settings/" class="submenu-item">
                            <i class="fas fa-cog"></i>
                            <span>Settings</span>
                        </a>
                    </div>
                </div>
            </div>

            <!-- Events - Simple Link -->
            <a href="/events/" class="nav-link">
                <i class="fas fa-calendar-alt"></i>
                <span>Events</span>
            </a>

            <!-- About Dropdown -->
            <div class="nav-item-dropdown">
                <a href="#" class="nav-link dropdown-trigger" onclick="return false;">
                    <i class="fas fa-info-circle"></i>
                    <span>About</span>
                    <i class="fas fa-chevron-down dropdown-arrow"></i>
                </a>
                <div class="dropdown-submenu">
                    <a href="/contact/" class="submenu-item">
                        <i class="fas fa-envelope"></i>
                        <span>Contact Us</span>
                    </a>
                    <a href="/why-eventhub/" class="submenu-item">
                        <i class="fas fa-question-circle"></i>
                        <span>Why EventHub</span>
                    </a>
                    <a href="/customer-stories/" class="submenu-item">
                        <i class="fas fa-users"></i>
                        <span>Customer Stories</span>
                    </a>
                </div>
            </div>

            <!-- My Tickets Dropdown (Logged In Users) -->
            <div class="nav-item-dropdown auth-only" style="display: none;">
                <a href="#" class="nav-link dropdown-trigger" onclick="return false;">
                    <i class="fas fa-ticket-alt"></i>
                    <span>My Tickets</span>
                    <i class="fas fa-chevron-down dropdown-arrow"></i>
                </a>
                <div class="dropdown-submenu">
                    <a href="/tickets/" class="submenu-item">
                        <i class="fas fa-ticket-alt"></i>
                        <span>My Tickets</span>
                    </a>
                    <a href="/cart/" class="submenu-item" id="navCartLink">
                        <i class="fas fa-shopping-cart"></i>
                        <span>My Bookings</span>
                        <span class="mobile-cart-badge" id="navCartBadge" style="display: none;">0</span>
                    </a>
                    <a href="/wishlist/" class="submenu-item" id="navWishlistLink">
                        <i class="fas fa-heart"></i>
                        <span>Wishlist</span>
                        <span class="mobile-wishlist-badge" id="navWishlistBadge" style="display: none;">0</span>
                    </a>
                </div>
            </div>

            <!-- Divider before logout -->
            <div class="mobile-divider-line"></div>

            <!-- SEPARATE LOGOUT BUTTON - Bottom of mobile menu -->
            <div id="mobileLogoutBtn" class="mobile-logout-wrapper" style="display: none;">
                <a href="#" onclick="logout(); return false;" class="mobile-logout-btn">
                    <i class="fas fa-sign-out-alt"></i>
                    <span>Logout</span>
                </a>
            </div>
        </div>

        <div class="nav-actions">
            <form class="search-form-desktop" action="/events/search/" method="GET" id="desktopSearchForm">
                <i class="fas fa-search"></i>
                <input type="text" name="q" id="desktopSearchInput" placeholder="Search events..." autocomplete="off">
                <div class="search-validation" id="desktopSearchValidation"></div>
                <button type="submit" id="desktopSearchBtn">Search</button>
            </form>

            <div class="notifications-dropdown">
                <button class="notifications-btn" id="notificationsBtn">
                    <i class="fas fa-bell"></i>
                    <span class="notification-badge" id="notificationBadge" style="display: none;">0</span>
                </button>
                <div class="notifications-panel" id="notificationsPanel">
                    <div class="notifications-header">
                        <h4>Notifications</h4>
                        <button onclick="markAllNotificationsRead()">Mark all as read</button>
                    </div>
                    <div class="notifications-list" id="notificationsList">
                        <div class="loading-state">No notifications</div>
                    </div>
                </div>
            </div>

            <!-- Account Dropdown (Desktop only) -->
            <div class="profile-dropdown">
                <button class="profile-btn" id="profileBtn">
                    <i class="fas fa-user-circle"></i>
                    <span id="profileUserName">Account</span>
                    <i class="fas fa-chevron-down"></i>
                    <span class="profile-notification-badge" id="profileNotificationBadge" style="display: none;"></span>
                </button>
                
                <div class="dropdown-menu" id="dropdownMenu">
                    <!-- Logged Out View -->
                    <div id="desktopGuestLinks">
                        <a href="/login/" class="dropdown-item">
                            <i class="fas fa-sign-in-alt"></i>
                            <span>Login</span>
                        </a>
                    </div>
                    
                    <!-- Logged In View -->
                    <div id="desktopUserLinks" style="display: none;">
                        <div class="user-info-dropdown">
                            <div class="user-avatar-dropdown">
                                <span id="desktopUserInitial">U</span>
                            </div>
                            <div>
                                <div class="user-name-dropdown" id="desktopUserName">User</div>
                                <div class="user-role-dropdown">Attendee</div>
                            </div>
                        </div>
                        <div class="dropdown-divider"></div>
                        <a href="/dashboard/" class="dropdown-item">
                            <i class="fas fa-tachometer-alt"></i>
                            <span>Dashboard</span>
                        </a>
                        <a href="/profile/" class="dropdown-item">
                            <i class="fas fa-user"></i>
                            <span>My Profile</span>
                        </a>
                        <a href="/settings/" class="dropdown-item">
                            <i class="fas fa-cog"></i>
                            <span>Settings</span>
                        </a>
                        <div class="dropdown-divider"></div>
                        <a href="#" onclick="logout()" class="dropdown-item logout-link">
                            <i class="fas fa-sign-out-alt"></i>
                            <span>Logout</span>
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <div class="mobile-overlay" id="mobileOverlay"></div>
</header>

<script>
document.addEventListener('DOMContentLoaded', function() {
    const accessToken = localStorage.getItem('attendee_access_token');
    const user = JSON.parse(localStorage.getItem('attendee_user') || '{}');
    
    // Desktop elements
    const desktopGuest = document.getElementById('desktopGuestLinks');
    const desktopUser = document.getElementById('desktopUserLinks');
    const desktopName = document.getElementById('desktopUserName');
    const desktopInitial = document.getElementById('desktopUserInitial');
    const profileUserName = document.getElementById('profileUserName');
    const navLinks = document.getElementById('navLinks');
    
    // Mobile elements
    const mobileGuest = document.getElementById('mobileGuestLinks');
    const mobileUser = document.getElementById('mobileUserLinks');
    const mobileUserName = document.getElementById('mobileUserName');
    const mobileUserInitial = document.getElementById('mobileUserInitial');
    const mobileAccountLabel = document.getElementById('mobileAccountLabel');
    const mobileLogoutBtn = document.getElementById('mobileLogoutBtn');
    
    const authOnlyElements = document.querySelectorAll('.auth-only');
    const guestOnlyElements = document.querySelectorAll('.guest-only');
    
    const isLoggedIn = accessToken && user && Object.keys(user).length > 0;
    
    // Force hide mobile account dropdown on desktop
    function handleMobileAccountVisibility() {
        const mobileAccountDropdown = document.getElementById('mobileAccountDropdown');
        if (mobileAccountDropdown) {
            if (window.innerWidth > 768) {
                mobileAccountDropdown.style.display = 'none';
            } else {
                mobileAccountDropdown.style.display = '';
            }
        }
    }
    
    function escapeHtml(text) {
        if (!text) return '';
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }
    
    function updateCartBadge() {
        if (!isLoggedIn) return;
        try {
            const savedCart = localStorage.getItem('eventhub_cart');
            let cart = { items: [] };
            if (savedCart) cart = JSON.parse(savedCart);
            const count = cart.items ? cart.items.reduce((sum, item) => sum + (item.quantity || 1), 0) : 0;
            const navBadge = document.getElementById('navCartBadge');
            if (navBadge) {
                navBadge.textContent = count;
                navBadge.style.display = count > 0 ? 'inline-block' : 'none';
            }
        } catch (error) {
            console.error("Error loading cart count:", error);
        }
    }
    
    function updateWishlistBadge() {
        if (!isLoggedIn) return;
        try {
            const savedWishlist = localStorage.getItem('event_wishlist');
            const wishlist = savedWishlist ? JSON.parse(savedWishlist) : [];
            const count = wishlist.length;
            const navBadge = document.getElementById('navWishlistBadge');
            if (navBadge) {
                navBadge.textContent = count;
                navBadge.style.display = count > 0 ? 'inline-block' : 'none';
            }
        } catch (error) {
            console.error("Error loading wishlist count:", error);
        }
    }
    
    if (isLoggedIn) {
        // Show desktop logged-in elements
        if (desktopUser) desktopUser.style.display = 'block';
        if (desktopGuest) desktopGuest.style.display = 'none';
        
        // Show mobile logged-in elements
        if (mobileUser) mobileUser.style.display = 'block';
        if (mobileGuest) mobileGuest.style.display = 'none';
        
        // Show auth-only elements (My Tickets dropdown)
        authOnlyElements.forEach(el => {
            el.style.display = 'block';
        });
        
        // Hide guest-only elements
        guestOnlyElements.forEach(el => {
            el.style.display = 'none';
        });
        
        // SHOW THE SEPARATE LOGOUT BUTTON
        if (mobileLogoutBtn) {
            mobileLogoutBtn.style.display = 'block';
        }
        
        const nameVal = user.first_name || user.username || user.name || 'User';
        const initialVal = nameVal.charAt(0).toUpperCase();
        
        // Desktop
        if (desktopName) desktopName.textContent = nameVal;
        if (desktopInitial) desktopInitial.textContent = initialVal;
        if (profileUserName) profileUserName.textContent = nameVal.split(' ')[0];
        
        // Mobile
        if (mobileUserName) mobileUserName.textContent = nameVal;
        if (mobileUserInitial) mobileUserInitial.textContent = initialVal;
        if (mobileAccountLabel) mobileAccountLabel.textContent = nameVal.split(' ')[0];
        
        // Load badges
        updateCartBadge();
        updateWishlistBadge();
        
        // Add logged-in class to nav-links for CSS styling
        if (navLinks) navLinks.classList.add('logged-in');
        if (navLinks) navLinks.classList.remove('logged-out');
    } else {
        // Show desktop logged-out elements
        if (desktopUser) desktopUser.style.display = 'none';
        if (desktopGuest) desktopGuest.style.display = 'block';
        
        // Show mobile logged-out elements
        if (mobileUser) mobileUser.style.display = 'none';
        if (mobileGuest) mobileGuest.style.display = 'block';
        
        // Hide auth-only elements
        authOnlyElements.forEach(el => {
            el.style.display = 'none';
        });
        
        // Show guest-only elements
        guestOnlyElements.forEach(el => {
            el.style.display = 'block';
        });
        
        // HIDE THE SEPARATE LOGOUT BUTTON FOR GUESTS
        if (mobileLogoutBtn) {
            mobileLogoutBtn.style.display = 'none';
        }
        
        if (profileUserName) profileUserName.textContent = 'Account';
        if (mobileAccountLabel) mobileAccountLabel.textContent = 'Account';
        
        // Add logged-out class to nav-links for CSS styling
        if (navLinks) navLinks.classList.add('logged-out');
        if (navLinks) navLinks.classList.remove('logged-in');
    }
    
    // Call mobile account visibility handler
    handleMobileAccountVisibility();
    
    // Listen for cart and wishlist updates
    window.addEventListener('cart-updated', function() {
        if (!isLoggedIn) return;
        updateCartBadge();
        showToast('Added to cart!', 'success');
    });
    
    window.addEventListener('wishlist-updated', function() {
        if (!isLoggedIn) return;
        updateWishlistBadge();
        showToast('Saved to wishlist!', 'success');
    });
    
    let dropdownOpened = false;
    const profileBtn = document.getElementById('profileBtn');
    const dropdownMenu = document.getElementById('dropdownMenu');
    
    // Toggle accordions in mobile view when clicking the arrow icon, or text of non-nav links like About
    document.querySelectorAll('.nav-links .dropdown-arrow, .nav-links a[href="#"], .nav-links a[href="#"] span').forEach(trigger => {
        trigger.addEventListener('click', function(e) {
            if (window.innerWidth <= 1024) {
                e.preventDefault();
                e.stopPropagation();
                
                const parent = this.closest('.nav-item-dropdown');
                const submenu = parent.querySelector('.dropdown-submenu');
                const arrow = parent.querySelector('.dropdown-arrow');
                
                const isOpen = submenu.classList.contains('show-mobile');
                
                // Close all other submenus first
                document.querySelectorAll('.nav-links .dropdown-submenu').forEach(sub => {
                    if (sub !== submenu) {
                        sub.classList.remove('show-mobile');
                    }
                });
                document.querySelectorAll('.nav-links .dropdown-arrow').forEach(arr => {
                    if (arr !== arrow) {
                        arr.style.transform = '';
                    }
                });
                
                // Toggle the current submenu
                if (!isOpen) {
                    submenu.classList.add('show-mobile');
                    if (arrow) {
                        arrow.style.transform = 'rotate(180deg)';
                    }
                } else {
                    submenu.classList.remove('show-mobile');
                    if (arrow) {
                        arrow.style.transform = '';
                    }
                }
            }
        });
    });
    
    function getCartCount() {
        try {
            const savedCart = localStorage.getItem('eventhub_cart');
            let cart = { items: [] };
            if (savedCart) cart = JSON.parse(savedCart);
            return cart.items ? cart.items.reduce((sum, item) => sum + (item.quantity || 1), 0) : 0;
        } catch (error) {
            return 0;
        }
    }
    
    function getWishlistCount() {
        try {
            const savedWishlist = localStorage.getItem('event_wishlist');
            const wishlist = savedWishlist ? JSON.parse(savedWishlist) : [];
            return wishlist.length;
        } catch (error) {
            return 0;
        }
    }
    
    function loadNotificationCount() {
        const notifications = JSON.parse(localStorage.getItem('notifications') || '[]');
        const unreadCount = notifications.filter(n => !n.read).length;
        const badge = document.getElementById('notificationBadge');
        if (badge) {
            badge.textContent = unreadCount;
            badge.style.display = unreadCount > 0 ? 'inline-block' : 'none';
        }
    }
    
    function updateProfileNotificationBadge() {
        if (!isLoggedIn) return;
        
        const cartCount = getCartCount();
        const wishlistCount = getWishlistCount();
        const totalItems = cartCount + wishlistCount;
        const profileBadge = document.getElementById('profileNotificationBadge');
        
        if (totalItems > 0 && !dropdownOpened) {
            profileBadge.textContent = totalItems > 99 ? '99+' : totalItems;
            profileBadge.style.display = 'flex';
            profileBadge.classList.add('animate-pulse');
            setTimeout(() => {
                if (profileBadge) profileBadge.classList.remove('animate-pulse');
            }, 800);
        } else {
            profileBadge.style.display = 'none';
            profileBadge.classList.remove('animate-pulse');
        }
    }
    
    function showToast(message, type) {
        const existingToast = document.querySelector('.custom-toast');
        if (existingToast) existingToast.remove();
        
        const toast = document.createElement('div');
        toast.className = `custom-toast toast-${type}`;
        toast.innerHTML = `<i class="fas ${type === 'success' ? 'fa-check-circle' : 'fa-info-circle'}"></i> ${message}`;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }
    
    if (isLoggedIn) {
        loadNotificationCount();
        updateProfileNotificationBadge();
    }
    
    const desktopSearchInput = document.getElementById('desktopSearchInput');
    const desktopSearchValidation = document.getElementById('desktopSearchValidation');
    if (desktopSearchInput) {
        desktopSearchInput.addEventListener('input', function() {
            const value = this.value.trim();
            if (value.length > 0 && value.length < 2) {
                desktopSearchValidation.innerHTML = '<i class="fas fa-info-circle"></i> Please enter at least 2 characters';
                desktopSearchValidation.classList.add('show', 'error');
                desktopSearchValidation.classList.remove('success');
            } else if (value.length >= 2) {
                desktopSearchValidation.innerHTML = '<i class="fas fa-check-circle"></i> Press Enter or click Search';
                desktopSearchValidation.classList.add('show', 'success');
                desktopSearchValidation.classList.remove('error');
            } else {
                desktopSearchValidation.classList.remove('show');
            }
        });
    }
    
    const mobileToggle = document.getElementById('mobileToggle');
    const mobileOverlay = document.getElementById('mobileOverlay');
    const closeMenu = document.getElementById('closeMenu');
    
    function openMobileMenu() {
        navLinks.classList.add('show');
        mobileOverlay.classList.add('show');
        document.body.classList.add('menu-open');
    }
    
    function closeMobileMenu() {
        navLinks.classList.remove('show');
        mobileOverlay.classList.remove('show');
        document.body.classList.remove('menu-open');
        
        // Reset mobile accordions when menu closes
        document.querySelectorAll('.nav-links .dropdown-submenu').forEach(sub => {
            sub.classList.remove('show-mobile');
        });
        document.querySelectorAll('.nav-links .dropdown-arrow').forEach(arr => {
            arr.style.transform = '';
        });
    }
    
    if (mobileToggle) mobileToggle.addEventListener('click', openMobileMenu);
    if (closeMenu) closeMenu.addEventListener('click', closeMobileMenu);
    if (mobileOverlay) mobileOverlay.addEventListener('click', closeMobileMenu);
    
    if (profileBtn && dropdownMenu) {
        profileBtn.addEventListener('click', function(e) {
            e.stopPropagation();
            dropdownMenu.classList.toggle('show');
            
            if (dropdownMenu.classList.contains('show')) {
                dropdownOpened = true;
                const profileBadge = document.getElementById('profileNotificationBadge');
                profileBadge.style.display = 'none';
                profileBadge.classList.remove('animate-pulse');
            }
        });
        
        document.addEventListener('click', function(e) {
            if (!dropdownMenu.contains(e.target) && !profileBtn.contains(e.target)) {
                dropdownMenu.classList.remove('show');
                setTimeout(() => {
                    if (!dropdownMenu.classList.contains('show')) {
                        const cartCount = getCartCount();
                        const wishlistCount = getWishlistCount();
                        if (cartCount === 0 && wishlistCount === 0) {
                            dropdownOpened = false;
                        } else {
                            if (!dropdownOpened) {
                                updateProfileNotificationBadge();
                            }
                        }
                    }
                }, 300);
            }
        });
    }
    
    const notifBtn = document.getElementById('notificationsBtn');
    const notifPanel = document.getElementById('notificationsPanel');
    if (notifBtn && notifPanel) {
        notifBtn.addEventListener('click', function(e) {
            e.stopPropagation();
            notifPanel.classList.toggle('show');
            loadNotifications();
        });
        document.addEventListener('click', function(e) {
            if (!notifPanel.contains(e.target) && !notifBtn.contains(e.target)) {
                notifPanel.classList.remove('show');
            }
        });
    }
    
    function loadNotifications() {
        const notificationsList = document.getElementById('notificationsList');
        if (!notificationsList) return;
        const notifications = JSON.parse(localStorage.getItem('notifications') || '[]');
        if (notifications.length === 0) {
            notificationsList.innerHTML = '<div class="empty-state">No notifications</div>';
            return;
        }
        notificationsList.innerHTML = notifications.map(notif => `
            <div class="notification-item ${notif.read ? '' : 'unread'}" data-id="${notif.id}">
                <div class="notification-icon"><i class="fas ${notif.icon || 'fa-bell'}"></i></div>
                <div class="notification-content">
                    <div class="notification-title">${escapeHtml(notif.title)}</div>
                    <div class="notification-message">${escapeHtml(notif.message)}</div>
                    <div class="notification-time">${escapeHtml(notif.time)}</div>
                </div>
            </div>
        `).join('');
    }
    
    document.querySelectorAll('.nav-link, .submenu-item').forEach(link => {
        link.addEventListener('click', closeMobileMenu);
    });
    
    // Add resize listener to handle mobile account visibility on window resize
    window.addEventListener('resize', function() {
        handleMobileAccountVisibility();
    });
});

// CORRECT LOGOUT FUNCTION - ONLY clears auth, preserves user data
function logout() {
    console.log('Logging out - preserving cart, wishlist, bookings, and tickets');
    
    // Clear ONLY authentication data
    localStorage.removeItem('attendee_access_token');
    localStorage.removeItem('attendee_refresh_token');
    localStorage.removeItem('attendee_user');
    
    window.dispatchEvent(new CustomEvent('auth-state-changed', { 
        detail: { isLoggedIn: false, user: null } 
    }));
    
    window.location.href = '/';
}

function markAllNotificationsRead() {
    const notifications = JSON.parse(localStorage.getItem('notifications') || '[]');
    notifications.forEach(n => n.read = true);
    localStorage.setItem('notifications', JSON.stringify(notifications));
    const badge = document.getElementById('notificationBadge');
    if (badge) badge.style.display = 'none';
    const panel = document.getElementById('notificationsPanel');
    if (panel) panel.classList.remove('show');
}

window.logout = logout;
window.markAllNotificationsRead = markAllNotificationsRead;
</script>
