{% load static %}
<!-- Enhanced Loader Component with Bold White Text -->
<link rel="stylesheet" href="{% static 'css/attendee/components/loading-spinner.css' %}">

<div id="pageLoader" class="page-loader">
    <div class="loader-overlay"></div>
    <div class="loader-container">
        <div class="loader-spinner-ring">
            <div class="spinner-ring arrow-1"></div>
            <div class="spinner-ring arrow-2"></div>
            <div class="spinner-ring arrow-3"></div>
            <div class="spinner-ring arrow-4"></div>
            <div class="loader-center-logo">
                <i class="fas fa-calendar-alt"></i>
            </div>
        </div>
        <div class="loader-text">
            <div class="loading-bold">
                <span>LOADING</span>
                <div class="dots-container">
                    <span></span>
                    <span></span>
                    <span></span>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="{% static 'js/attendee/components/loading-spinner.js' %}"></script>
