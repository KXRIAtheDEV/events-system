{% load static %}
<section class="stats-section">
    <div class="container">
        <div class="section-header">
            <h2>Our Impact</h2>
            <p>EventHub by the numbers</p>
        </div>
        <div class="analytics-grid" id="statsSection">
            <div class="analytics-card">
                <div class="analytics-number" id="countEvents" data-target="1248">0</div>
                <p><i class="fas fa-calendar-check"></i> Events Hosted</p>
            </div>
            <div class="analytics-card">
                <div class="analytics-number" id="countTickets" data-target="15842">0</div>
                <p><i class="fas fa-ticket-alt"></i> Tickets Sold</p>
            </div>
            <div class="analytics-card">
                <div class="analytics-number" id="countOrganizers" data-target="326">0</div>
                <p><i class="fas fa-users"></i> Organizers</p>
            </div>
            <div class="analytics-card">
                <div class="analytics-number" id="countSatisfaction" data-target="98">0</div>
                <p><i class="fas fa-smile"></i> Satisfaction Rate</p>
            </div>
        </div>
    </div>
</section>
