{% load static %}
<section class="how-it-works-section">
    <div class="container">
        <div class="section-header">
            <h2>How It Works</h2>
            <p>Get started in three simple steps</p>
        </div>
        <div class="steps-grid">
            <div class="step-card">
                <div class="step-icon">
                    <i class="fas fa-search"></i>
                </div>
                <h3>Discover</h3>
                <p>Browse through hundreds of exciting events happening near you</p>
            </div>
            <div class="step-card">
                <div class="step-icon">
                    <i class="fas fa-ticket-alt"></i>
                </div>
                <h3>Book Tickets</h3>
                <p>Select your tickets and complete payment securely</p>
            </div>
            <div class="step-card">
                <div class="step-icon">
                    <i class="fas fa-qrcode"></i>
                </div>
                <h3>Attend Event</h3>
                <p>Show your QR code at the venue and enjoy the experience</p>
            </div>
        </div>
    </div>
</section>
