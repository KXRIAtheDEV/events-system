{% extends "organizer/base.html" %}
{% load static %}
{% block title %}Notifications | EventHub Organizer{% endblock %}
{% block extra_css %}
<link rel="stylesheet" href="/static/css/organizers/notifications.css">
{% endblock %}
{% block content %}
<div>
    <div class="d-flex justify-content-between mb-4"><h1>Notifications</h1><button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#sendNotificationModal">Send Notification</button></div>
    <div class="row g-4">
        <div class="col-lg-7"><div class="chart-card"><h5>Recent Notifications</h5><button class="btn btn-sm btn-link" id="markAllReadNotif">Mark all read</button><div id="notifListPanel"></div></div></div>
        <div class="col-lg-5"><div class="chart-card"><h5>Preferences</h5><form id="prefForm"><div class="form-check"><input class="form-check-input" type="checkbox" id="prefEmail"><label>Email</label></div><div class="form-check"><input class="form-check-input" type="checkbox" id="prefBrowser"><label>Browser</label></div><div class="form-check"><input class="form-check-input" type="checkbox" id="prefReminders"><label>Event reminders</label></div><div class="form-check"><input class="form-check-input" type="checkbox" id="prefPayout"><label>Payout updates</label></div><button type="submit" class="btn btn-primary mt-2">Save</button></form></div></div>
    </div>
</div>
<div class="modal fade" id="sendNotificationModal"><div class="modal-dialog"><div class="modal-content"><div class="modal-header"><h5>Send to Attendees</h5></div><div class="modal-body"><select id="notifEvent" class="form-select mb-2"><option value="">Select Event</option></select><input type="text" id="notifTitle" class="form-control mb-2" placeholder="Title"><textarea id="notifMessage" class="form-control" rows="4" placeholder="Message"></textarea></div><div class="modal-footer"><button class="btn btn-primary" id="sendNotifBtn">Send</button></div></div></div></div>
{% endblock %}
{% block extra_js %}
<script src="/static/js/organizer/notifications.js"></script>
{% endblock %}
