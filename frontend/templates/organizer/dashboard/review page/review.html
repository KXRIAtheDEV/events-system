{% extends "organizer/base.html" %}
{% block title %}Reviews{% endblock %}
{% block content %}
<div class="container-fluid px-4 py-4">
    <div class="d-flex justify-content-between"><h1 class="h2">Reviews</h1><select id="eventFilterRev" class="form-select w-auto"><option value="">All Events</option></select><button id="exportRevBtn" class="btn btn-outline-primary">Export</button></div>
    <div class="row g-4 my-3"><div class="col-md-4"><div class="stat-card text-center"><h2 id="avgRatingDisplay">--</h2><div id="starDisplay"></div><small>Average Rating</small></div></div><div class="col-md-4"><div class="stat-card text-center"><h3 id="totalReviewsDisplay">--</h3><small>Total Reviews</small></div></div><div class="col-md-4"><div class="stat-card text-center"><h3 id="responseRateDisplay">--%</h3><small>Response Rate</small></div></div></div>
    <div class="stat-card"><table class="table"><thead><tr><th>Event</th><th>Attendee</th><th>Rating</th><th>Review</th><th>Response</th><th>Action</th></tr></thead><tbody id="reviewsList"></tbody></table><nav><ul class="pagination" id="revPagination"></ul></nav></div>
</div>
<div class="modal fade" id="respondModal"><div class="modal-dialog"><div class="modal-content"><div class="modal-header"><h5>Respond to Review</h5></div><div class="modal-body"><div id="reviewPreview"></div><textarea id="responseText" class="form-control" rows="4"></textarea></div><div class="modal-footer"><button class="btn btn-primary" id="submitResponse">Send</button></div></div></div></div>
{% endblock %}
{% block extra_js %}
<script>
    let revPage=1, currentRevId=null;
    async function loadReviews(){ let ev=document.getElementById('eventFilterRev').value; let data=ev?await OrganizerAPI.reviews.getEventReviews(ev,revPage,20):await OrganizerAPI.reviews.getAll(revPage,20); let html=data.results.map(r=>`<tr><td>${r.event_title}</td><td>${r.attendee_name}</td><td>${'★'.repeat(r.rating)}${'☆'.repeat(5-r.rating)}</td><td>${r.comment||'-'}</td><td>${r.response||'Not responded'}</td><td>${!r.response?`<button class="btn btn-sm btn-outline-primary respondBtn" data-id="${r.id}" data-review="${escapeHtml(r.comment||'')}">Respond</button>`:'-'}</td></tr>`).join(''); document.getElementById('reviewsList').innerHTML=html||'<tr><td colspan="6">No reviews</td></tr>'; window.renderPagination(data,revPage,(p)=>{revPage=p;loadReviews();},'revPagination'); attachRespondBtns(); }
    async function loadStats(){ let s=await OrganizerAPI.reviews.getStats(); document.getElementById('avgRatingDisplay').innerText=s.avg_rating?.toFixed(1)||'0'; let stars=''; for(let i=0;i<Math.floor(s.avg_rating||0);i++) stars+='★'; for(let i=0;i<5-Math.floor(s.avg_rating||0);i++) stars+='☆'; document.getElementById('starDisplay').innerHTML=stars; document.getElementById('totalReviewsDisplay').innerText=s.total_reviews||0; document.getElementById('responseRateDisplay').innerText=s.response_rate||0; }
    function attachRespondBtns(){ document.querySelectorAll('.respondBtn').forEach(btn=>btn.onclick=()=>{currentRevId=btn.dataset.id; document.getElementById('reviewPreview').innerHTML=`<div class="alert alert-secondary">${btn.dataset.review}</div>`; document.getElementById('responseText').value=''; new bootstrap.Modal(document.getElementById('respondModal')).show();}); }
    document.getElementById('submitResponse').onclick=async()=>{let resp=document.getElementById('responseText').value; if(!resp) return alert('Enter response'); await OrganizerAPI.reviews.respond(currentRevId,resp); window.showToast('Response sent','success'); bootstrap.Modal.getInstance(document.getElementById('respondModal')).hide(); loadReviews(); loadStats(); };
    document.getElementById('eventFilterRev').onchange=()=>{revPage=1; loadReviews(); loadStats();};
    document.getElementById('exportRevBtn').onclick=()=>window.open(ORGANIZER_API_CONFIG.API_BASE+ORGANIZER_API_CONFIG.ENDPOINTS.REVIEWS.export,'_blank');
    loadReviews(); loadStats();
    function escapeHtml(str){return str.replace(/[&<>]/g,m=>m==='&'?'&amp;':m==='<'?'&lt;':'&gt;');}
</script>
{% endblock %}
