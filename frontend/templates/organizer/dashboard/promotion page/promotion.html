{% extends "organizer/base.html" %}
{% block title %}Promotions{% endblock %}
{% block content %}
<div class="container-fluid px-4 py-4">
    <div class="d-flex justify-content-between"><h1 class="h2">Promotions</h1><button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#promoModal">Create Promo</button></div>
    <div class="row g-4 my-3"><div class="col-md-3"><div class="stat-card text-center"><h3 id="totalPromos">--</h3><small>Total</small></div></div><div class="col-md-3"><div class="stat-card text-center"><h3 id="activePromos">--</h3><small>Active</small></div></div></div>
    <div class="stat-card"><table class="table"><thead><tr><th>Code</th><th>Discount</th><th>Event</th><th>Valid Until</th><th>Usage</th><th>Status</th><th>Actions</th></tr></thead><tbody id="promoList"></tbody></table><nav><ul class="pagination" id="promoPagination"></ul></nav></div>
</div>
<div class="modal fade" id="promoModal"><div class="modal-dialog"><div class="modal-content"><div class="modal-header"><h5>Create/Edit Promo</h5></div><div class="modal-body"><input type="text" id="promoCode" class="form-control mb-2" placeholder="Code"><select id="discountType" class="form-select mb-2"><option value="percentage">Percentage</option><option value="fixed">Fixed</option></select><input type="number" id="discountValue" class="form-control mb-2" placeholder="Value"><select id="promoEventId" class="form-select mb-2"><option value="">All Events</option></select><input type="datetime-local" id="validUntil" class="form-control mb-2"><input type="number" id="usageLimit" class="form-control mb-2" placeholder="Usage limit (optional)"><textarea id="promoDesc" class="form-control" placeholder="Description"></textarea></div><div class="modal-footer"><button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button><button class="btn btn-primary" id="savePromo">Save</button></div></div></div></div>
{% endblock %}
{% block extra_js %}
<script>
    let promoPage=1, editingId=null;
    async function loadPromos(){ let data=await OrganizerAPI.promotions.getAll(promoPage,20); document.getElementById('totalPromos').innerText=data.count||0; document.getElementById('activePromos').innerText=data.results?.filter(p=>p.is_active).length||0; let html=data.results.map(p=>`<tr><td>${p.code}</td><td>${p.discount_type=='percentage'?p.discount_value+'%':'$'+p.discount_value}</td><td>${p.event_title||'All'}</td><td>${p.valid_until?new Date(p.valid_until).toLocaleDateString():'Never'}</td><td>${p.used_count||0}/${p.usage_limit||'∞'}</td><td><span class="badge ${p.is_active?'bg-success':'bg-secondary'}">${p.is_active?'Active':'Inactive'}</span></td><td><button class="btn btn-sm btn-outline-primary togglePromo" data-id="${p.id}" data-active="${p.is_active}">${p.is_active?'Deactivate':'Activate'}</button> <button class="btn btn-sm btn-outline-danger deletePromo" data-id="${p.id}">Del</button></td></tr>`).join(''); document.getElementById('promoList').innerHTML=html||'<tr><td colspan="7">No promos</td></tr>'; window.renderPagination(data,promoPage,(p)=>{promoPage=p;loadPromos();},'promoPagination'); attachPromoActions(); }
    async function loadEventsForSelect(){ let events=await OrganizerAPI.events.getAll(1,100); let sel=document.getElementById('promoEventId'); sel.innerHTML='<option value="">All Events</option>'+events.results.map(e=>`<option value="${e.id}">${e.title}</option>`).join(''); }
    async function savePromo(){ let data={code:document.getElementById('promoCode').value,discount_type:document.getElementById('discountType').value,discount_value:parseFloat(document.getElementById('discountValue').value),event_id:document.getElementById('promoEventId').value||null,valid_until:document.getElementById('validUntil').value||null,usage_limit:document.getElementById('usageLimit').value||null,description:document.getElementById('promoDesc').value}; if(!data.code||!data.discount_value) return alert('Fill required'); if(editingId) await OrganizerAPI.promotions.update(editingId,data); else await OrganizerAPI.promotions.create(data); window.showToast(editingId?'Updated':'Created','success'); bootstrap.Modal.getInstance(document.getElementById('promoModal')).hide(); loadPromos(); }
    function attachPromoActions(){ document.querySelectorAll('.togglePromo').forEach(btn=>btn.onclick=async()=>{if(btn.dataset.active=='true') await OrganizerAPI.promotions.deactivate(btn.dataset.id); else await OrganizerAPI.promotions.activate(btn.dataset.id); loadPromos();}); document.querySelectorAll('.deletePromo').forEach(btn=>btn.onclick=async()=>{if(confirm('Delete?')){await OrganizerAPI.promotions.delete(btn.dataset.id); loadPromos();}}); }
    document.getElementById('savePromo').onclick=savePromo; loadPromos(); loadEventsForSelect();
</script>
{% endblock %}
