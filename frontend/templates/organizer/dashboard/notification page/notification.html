{% extends "organizer/base.html" %}
{% block title %}Notifications{% endblock %}
{% block content %}
<div class="container-fluid px-4 py-4">
    <div class="d-flex justify-content-between"><h1 class="h2">Notifications</h1><button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#sendModal">Send Notification</button></div>
    <div class="row g-4"><div class="col-lg-7"><div class="stat-card"><h5>Recent Notifications</h5><button class="btn btn-sm btn-link" id="markAllReadNotif">Mark all read</button><div id="notifListPanel"></div></div></div><div class="col-lg-5"><div class="stat-card"><h5>Preferences</h5><form id="prefForm"><div class="form-check"><input class="form-check-input" type="checkbox" id="prefEmail"><label>Email</label></div><div class="form-check"><input class="form-check-input" type="checkbox" id="prefBrowser"><label>Browser</label></div><div class="form-check"><input class="form-check-input" type="checkbox" id="prefReminders"><label>Event reminders</label></div><div class="form-check"><input class="form-check-input" type="checkbox" id="prefPayout"><label>Payout updates</label></div><button type="submit" class="btn btn-primary mt-2">Save</button></form></div></div></div>
</div>
<div class="modal fade" id="sendModal"><div class="modal-dialog"><div class="modal-content"><div class="modal-header"><h5>Send to Attendees</h5></div><div class="modal-body"><select id="notifEvent" class="form-select mb-2"><option value="">Select Event</option></select><input type="text" id="notifTitle" class="form-control mb-2" placeholder="Title"><textarea id="notifMessage" class="form-control" rows="4" placeholder="Message"></textarea></div><div class="modal-footer"><button class="btn btn-primary" id="sendNotifBtn">Send</button></div></div></div></div>
{% endblock %}
{% block extra_js %}
<script>
    async function loadNotifList(){ let data=await OrganizerAPI.notifications.getList(1,50); let html=data.results.map(n=>`<div class="notification-item p-2 mb-2 rounded ${n.is_read?'':'unread'}" data-id="${n.id}"><strong>${n.title}</strong><br><small>${n.message}</small><br><small class="text-muted">${new Date(n.created_at).toLocaleString()}</small></div>`).join(''); document.getElementById('notifListPanel').innerHTML=html||'None'; document.querySelectorAll('.notification-item').forEach(el=>{if(!el.classList.contains('unread')) return; el.onclick=async()=>{await OrganizerAPI.notifications.markAsRead(el.dataset.id); el.classList.remove('unread');};}); }
    async function loadEventsForNotif(){ let events=await OrganizerAPI.events.getAll(1,100); let sel=document.getElementById('notifEvent'); sel.innerHTML='<option value="">Select Event</option>'+events.results.map(e=>`<option value="${e.id}">${e.title}</option>`).join(''); }
    async function sendNotif(){ let ev=document.getElementById('notifEvent').value; let title=document.getElementById('notifTitle').value; let msg=document.getElementById('notifMessage').value; if(!ev||!title||!msg) return alert('Fill all'); await OrganizerAPI.notifications.sendToAttendees(ev,title,msg); window.showToast('Sent','success'); bootstrap.Modal.getInstance(document.getElementById('sendModal')).hide(); }
    async function loadPrefs(){ let p=await OrganizerAPI.notifications.getPreferences(); document.getElementById('prefEmail').checked=p.email||false; document.getElementById('prefBrowser').checked=p.browser||false; document.getElementById('prefReminders').checked=p.event_reminders||false; document.getElementById('prefPayout').checked=p.payout_updates||false; }
    async function savePrefs(e){ e.preventDefault(); let prefs={email:document.getElementById('prefEmail').checked,browser:document.getElementById('prefBrowser').checked,event_reminders:document.getElementById('prefReminders').checked,payout_updates:document.getElementById('prefPayout').checked}; await OrganizerAPI.notifications.updatePreferences(prefs); window.showToast('Preferences saved','success'); }
    document.getElementById('markAllReadNotif').onclick=async()=>{await OrganizerAPI.notifications.markAllAsRead(); loadNotifList();};
    document.getElementById('sendNotifBtn').onclick=sendNotif;
    document.getElementById('prefForm').onsubmit=savePrefs;
    loadNotifList(); loadEventsForNotif(); loadPrefs();
</script>
{% endblock %}
