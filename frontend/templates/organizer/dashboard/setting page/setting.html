{% extends "organizer/base.html" %}
{% block title %}Settings{% endblock %}
{% block content %}
<div class="container-fluid px-4 py-4">
    <h1 class="h2">Settings</h1>
    <ul class="nav nav-tabs"><li class="nav-item"><button class="nav-link active" data-bs-toggle="tab" data-bs-target="#general">General</button></li><li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#paymentTab">Payment</button></li><li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#teamTab">Team</button></li><li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#apiTab">API Keys</button></li></ul>
    <div class="tab-content mt-3">
        <div class="tab-pane active" id="general"><div class="stat-card"><form id="generalForm"><div class="row"><div class="col-md-6 mb-3"><label>Org Name</label><input type="text" id="orgName" class="form-control"></div><div class="col-md-6 mb-3"><label>Email</label><input type="email" id="orgEmail" class="form-control"></div><div class="col-md-6 mb-3"><label>Phone</label><input type="text" id="orgPhone" class="form-control"></div><div class="col-md-6 mb-3"><label>Website</label><input type="url" id="orgWebsite" class="form-control"></div><div class="col-12 mb-3"><label>Bio</label><textarea id="orgBio" class="form-control"></textarea></div></div><button type="submit" class="btn btn-primary">Save</button></form></div></div>
        <div class="tab-pane" id="paymentTab"><div class="stat-card"><form id="paymentForm"><div class="mb-3"><label>Bank Account</label><input type="text" id="bankAccount" class="form-control"></div><div class="mb-3"><label>Bank Name</label><input type="text" id="bankNameSetting" class="form-control"></div><div class="mb-3"><label>Account Holder</label><input type="text" id="accountHolderSetting" class="form-control"></div><div class="mb-3"><label>Routing Number</label><input type="text" id="routingNumber" class="form-control"></div><button type="submit" class="btn btn-primary">Save</button></form></div></div>
        <div class="tab-pane" id="teamTab"><div class="stat-card"><div class="d-flex justify-content-between"><h5>Team Members</h5><button class="btn btn-sm btn-primary" data-bs-toggle="modal" data-bs-target="#addTeamModal">Add Member</button></div><div id="teamList"></div></div></div>
        <div class="tab-pane" id="apiTab"><div class="stat-card"><div class="d-flex justify-content-between"><h5>API Keys</h5><button class="btn btn-sm btn-primary" id="createApiKeyBtn">Generate Key</button></div><div id="apiKeysList"></div></div></div>
    </div>
</div>
<div class="modal fade" id="addTeamModal"><div class="modal-dialog"><div class="modal-content"><div class="modal-header"><h5>Add Team Member</h5></div><div class="modal-body"><input type="email" id="teamEmail" class="form-control mb-2" placeholder="Email"><select id="teamRole" class="form-select"><option value="viewer">Viewer</option><option value="editor">Editor</option><option value="admin">Admin</option></select></div><div class="modal-footer"><button class="btn btn-primary" id="addTeamBtn">Add</button></div></div></div></div>
{% endblock %}
{% block extra_js %}
<script>
    async function loadGeneral(){ let g=await OrganizerAPI.settings.getGeneral(); document.getElementById('orgName').value=g.organization_name||''; document.getElementById('orgEmail').value=g.email||''; document.getElementById('orgPhone').value=g.phone||''; document.getElementById('orgWebsite').value=g.website||''; document.getElementById('orgBio').value=g.bio||''; }
    async function saveGeneral(e){ e.preventDefault(); let data={organization_name:document.getElementById('orgName').value,email:document.getElementById('orgEmail').value,phone:document.getElementById('orgPhone').value,website:document.getElementById('orgWebsite').value,bio:document.getElementById('orgBio').value}; await OrganizerAPI.settings.updateGeneral(data); window.showToast('Saved','success'); }
    async function loadPayment(){ let p=await OrganizerAPI.payouts.getSettings(); document.getElementById('bankAccount').value=p.account_number||''; document.getElementById('bankNameSetting').value=p.bank_name||''; document.getElementById('accountHolderSetting').value=p.account_holder||''; document.getElementById('routingNumber').value=p.routing_number||''; }
    async function savePayment(e){ e.preventDefault(); let data={account_number:document.getElementById('bankAccount').value,bank_name:document.getElementById('bankNameSetting').value,account_holder:document.getElementById('accountHolderSetting').value,routing_number:document.getElementById('routingNumber').value}; await OrganizerAPI.payouts.updateSettings(data); window.showToast('Payment saved','success'); }
    async function loadTeam(){ let t=await OrganizerAPI.settings.getTeam(); let html=t.map(m=>`<div class="d-flex justify-content-between border-bottom py-2"><div><strong>${m.email}</strong> (${m.role})</div><button class="btn btn-sm btn-outline-danger removeTeam" data-id="${m.id}">Remove</button></div>`).join(''); document.getElementById('teamList').innerHTML=html||'No members'; document.querySelectorAll('.removeTeam').forEach(btn=>btn.onclick=async()=>{await OrganizerAPI.settings.removeTeamMember(btn.dataset.id); loadTeam();}); }
    async function addTeamMember(){ let email=document.getElementById('teamEmail').value; let role=document.getElementById('teamRole').value; if(!email) return; await OrganizerAPI.settings.addTeamMember(email,role); window.showToast('Member added','success'); bootstrap.Modal.getInstance(document.getElementById('addTeamModal')).hide(); loadTeam(); }
    async function loadApiKeys(){ let keys=await OrganizerAPI.settings.getApiKeys(); let html=keys.map(k=>`<div class="d-flex justify-content-between border-bottom py-2"><div><code>${k.name}</code><br><small>Created: ${new Date(k.created_at).toLocaleDateString()}</small></div><button class="btn btn-sm btn-outline-danger revokeKey" data-id="${k.id}">Revoke</button></div>`).join(''); document.getElementById('apiKeysList').innerHTML=html||'No keys'; document.querySelectorAll('.revokeKey').forEach(btn=>btn.onclick=async()=>{await OrganizerAPI.settings.revokeApiKey(btn.dataset.id); loadApiKeys();}); }
    async function createApiKey(){ let name=prompt('Key name:'); if(name){ let key=await OrganizerAPI.settings.createApiKey(name); alert(`Your new key: ${key.key}\nSave it now.`); loadApiKeys(); } }
    document.getElementById('generalForm').onsubmit=saveGeneral; document.getElementById('paymentForm').onsubmit=savePayment; document.getElementById('addTeamBtn').onclick=addTeamMember; document.getElementById('createApiKeyBtn').onclick=createApiKey; loadGeneral(); loadPayment(); loadTeam(); loadApiKeys();
</script>
{% endblock %}
