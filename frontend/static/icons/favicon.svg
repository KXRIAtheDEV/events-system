<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
    <defs>
        <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#f59e0b"/>
            <stop offset="100%" stop-color="#ec6408"/>
        </linearGradient>
        <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
            <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="rgba(0,0,0,0.5)"/>
        </filter>
    </defs>
    <!-- Bright orange gradient background -->
    <rect width="100" height="100" rx="22" fill="url(#grad)"/>
    <!-- Inner glow border -->
    <rect width="94" height="94" x="3" y="3" rx="19" fill="none" stroke="rgba(255,255,255,0.35)" stroke-width="2"/>
    <!-- Extra bold bright white letter E -->
    <text x="50" y="74" font-family="'Kaushan Script', 'Georgia', 'Times New Roman', serif" font-size="78" font-weight="900" fill="#FFFFFF" text-anchor="middle" filter="url(#shadow)">E</text>
</svg>
