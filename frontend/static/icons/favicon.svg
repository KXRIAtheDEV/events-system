<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
    <defs>
        <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#f59e0b"/>
            <stop offset="100%" stop-color="#ec6408"/>
        </linearGradient>
        <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#fbbf24"/>
            <stop offset="100%" stop-color="#f59e0b"/>
        </linearGradient>
    </defs>
    <!-- Background with rounded corners -->
    <rect width="100" height="100" rx="20" fill="url(#grad)"/>
    <!-- Calendar body -->
    <rect x="20" y="25" width="60" height="55" rx="8" fill="none" stroke="white" stroke-width="4"/>
    <!-- Calendar header bar -->
    <rect x="20" y="30" width="60" height="15" rx="4" fill="rgba(255,255,255,0.2)"/>
    <!-- Calendar month bar -->
    <line x1="20" y1="45" x2="80" y2="45" stroke="white" stroke-width="3"/>
    <!-- Calendar dates -->
    <text x="50" y="68" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="white" text-anchor="middle">31</text>
    <!-- Decorative dots -->
    <circle cx="35" cy="80" r="2" fill="rgba(255,255,255,0.6)"/>
    <circle cx="50" cy="80" r="2" fill="rgba(255,255,255,0.6)"/>
    <circle cx="65" cy="80" r="2" fill="rgba(255,255,255,0.6)"/>
</svg>
