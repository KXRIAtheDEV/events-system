<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="grad" x1="0%" x1="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff" />
      <stop offset="100%" style="stop-color:#f0f0f0" />
    </linearGradient>
  </defs>
  
  <!-- White background rectangle -->
  <rect width="100" height="100" rx="20" fill="#ffffff"/>
  
  <!-- Calendar body -->
  <rect x="12" y="18" width="76" height="70" rx="10" fill="url(#grad)" stroke="#e2e8f0" stroke-width="1"/>
  
  <!-- Calendar top tabs -->
  <rect x="22" y="8" width="12" height="14" rx="3" fill="#f59e0b"/>
  <rect x="66" y="8" width="12" height="14" rx="3" fill="#ec6408"/>
  
  <!-- Calendar header bar -->
  <rect x="12" y="34" width="76" height="6" fill="#1a1a2e" opacity="0.1"/>
  
  <!-- Calendar grid lines - lighter and fewer -->
  <rect x="12" y="46" width="22" height="3" rx="1.5" fill="#1a1a2e" opacity="0.06"/>
  <rect x="39" y="46" width="22" height="3" rx="1.5" fill="#1a1a2e" opacity="0.06"/>
  <rect x="66" y="46" width="22" height="3" rx="1.5" fill="#1a1a2e" opacity="0.06"/>
  
  <rect x="12" y="54" width="22" height="3" rx="1.5" fill="#1a1a2e" opacity="0.06"/>
  <rect x="39" y="54" width="22" height="3" rx="1.5" fill="#1a1a2e" opacity="0.06"/>
  <rect x="66" y="54" width="22" height="3" rx="1.5" fill="#1a1a2e" opacity="0.06"/>
  
  <rect x="12" y="62" width="22" height="3" rx="1.5" fill="#1a1a2e" opacity="0.06"/>
  <rect x="39" y="62" width="22" height="3" rx="1.5" fill="#1a1a2e" opacity="0.06"/>
  <rect x="66" y="62" width="22" height="3" rx="1.5" fill="#1a1a2e" opacity="0.06"/>
  
  <!-- Letter E - Larger size -->
  <text x="50" y="80" font-size="48" text-anchor="middle" fill="#1a1a2e" font-weight="bold" font-family="Arial, sans-serif">E</text>
</svg>
